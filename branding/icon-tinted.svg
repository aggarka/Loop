<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Grayscale source for the system "tinted" appearance. Black background,
       light-gray mark; iOS applies the user's tint based on luminance. -->
  <rect width="1024" height="1024" fill="#000000"/>
  <g fill="none" stroke="#D6D6D6" stroke-width="76" stroke-linecap="round">
    <circle cx="406" cy="512" r="196"/>
    <circle cx="618" cy="512" r="196" stroke-opacity="0.9"/>
  </g>
  <g fill="#D6D6D6">
    <circle cx="406" cy="316" r="30"/>
    <circle cx="618" cy="708" r="30"/>
  </g>
</svg>
